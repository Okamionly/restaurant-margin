name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: TypeScript check
        run: cd client && npx tsc --noEmit --skipLibCheck

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npx vite build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage gate (≥70%)
        run: npm run test:coverage
        env:
          JWT_SECRET: test-secret-minimum-32-chars-for-ci-only-xxxxx
          NODE_ENV: test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env file is tracked by git!"
            exit 1
          fi
          if git ls-files --error-unmatch client/.env 2>/dev/null; then
            echo "::error::client/.env file is tracked by git!"
            exit 1
          fi
          if git ls-files --error-unmatch server/.env 2>/dev/null; then
            echo "::error::server/.env file is tracked by git!"
            exit 1
          fi
          echo "No .env files committed."

      - name: Scan for hardcoded secrets
        run: |
          # Fail-the-build patterns (known real-service key prefixes)
          CRITICAL_PATTERNS=(
            'sk-[a-zA-Z0-9_-]{20,}'
            're_[a-zA-Z0-9_-]{20,}'
            'sk_live_[a-zA-Z0-9]{20,}'
            'whsec_[a-zA-Z0-9]{20,}'
            'eyJhbGciOi[a-zA-Z0-9_-]{50,}'
            'xox[baprs]-[a-zA-Z0-9-]{10,}'
          )
          # Warn-only patterns (heuristics prone to false positives)
          WARN_PATTERNS=(
            'SUPABASE_SERVICE_ROLE_KEY\s*=\s*"[^"]{20,}"'
            'password\s*[:=]\s*"[^"]{8,}"'
            'secret\s*[:=]\s*"[^"]{8,}"'
            'api[_-]?key\s*[:=]\s*"[^"]{20,}"'
          )
          CRITICAL_FOUND=0
          for pattern in "${CRITICAL_PATTERNS[@]}"; do
            RESULTS=$(grep -rnE --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" --include="*.cjs" --include="*.json" \
              "$pattern" \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=.git \
              --exclude="package-lock.json" \
              . || true)
            if [ -n "$RESULTS" ]; then
              echo "::error::Hardcoded live secret detected matching pattern: $pattern"
              echo "$RESULTS"
              CRITICAL_FOUND=1
            fi
          done
          for pattern in "${WARN_PATTERNS[@]}"; do
            RESULTS=$(grep -rnE --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" --include="*.cjs" --include="*.json" \
              "$pattern" \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=.git \
              --exclude="package-lock.json" \
              . || true)
            if [ -n "$RESULTS" ]; then
              echo "::warning::Potential secret matching pattern: $pattern"
              echo "$RESULTS"
            fi
          done
          if [ "$CRITICAL_FOUND" -eq 1 ]; then
            echo "::error::One or more hardcoded live secrets found. Rotate and refactor before merge."
            exit 1
          fi
          echo "No critical hardcoded secrets detected."
