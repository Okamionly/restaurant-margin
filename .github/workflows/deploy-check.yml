name: Deploy Check

on:
  pull_request:
    branches: [main]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: TypeScript check
        run: cd client && npx tsc --noEmit --skipLibCheck

      - name: Production build
        run: cd client && npx vite build

      - name: Check bundle size
        run: |
          MAX_SIZE_KB=2048
          DIST_DIR="client/dist"
          if [ -d "$DIST_DIR" ]; then
            TOTAL_SIZE=$(du -sk "$DIST_DIR" | cut -f1)
            echo "Bundle size: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt "$MAX_SIZE_KB" ]; then
              echo "::warning::Bundle size (${TOTAL_SIZE}KB) exceeds ${MAX_SIZE_KB}KB threshold"
            else
              echo "Bundle size is within limits."
            fi
          else
            echo "::error::dist directory not found after build"
            exit 1
          fi

      - name: Check for console.log in source
        run: |
          LOGS=$(grep -rn "console\.log" client/src/ --include="*.ts" --include="*.tsx" || true)
          if [ -n "$LOGS" ]; then
            echo "::warning::console.log statements found in source code:"
            echo "$LOGS"
          else
            echo "No console.log statements found."
          fi

      - name: Verify no .env files in PR
        run: |
          FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")
          if echo "$FILES" | grep -qE '\.env'; then
            echo "::error::.env file detected in PR changes!"
            exit 1
          fi
          echo "No .env files in PR."
