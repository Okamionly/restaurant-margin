          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La marge brute se calcule ainsi : prix de vente HT moins coût matière. Le ratio matière (food cost) s'obtient en divisant le coût matière par le prix de vente HT. En restauration, un ratio matière sain se situe entre 25% et 35% selon le type d'établissement."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'une fiche technique en cuisine ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Une fiche technique est un document détaillant les ingrédients, grammages, coûts, allergènes et process de fabrication d'un plat. Elle sert à standardiser la production, calculer précisément la marge et garantir la traçabilité HACCP dans un restaurant."
          }
        },
        {
          "@type": "Question",
          "name": "Comment réduire le food cost de son restaurant ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pour réduire le food cost, optimisez vos fiches techniques, négociez avec vos fournisseurs, suivez vos stocks avec la méthode FIFO, réduisez le gaspillage alimentaire, standardisez les portions et analysez régulièrement la rentabilité de chaque plat avec un logiciel de gestion."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le coefficient multiplicateur en restauration ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le coefficient multiplicateur est le rapport entre le prix de vente TTC et le coût matière. En restauration traditionnelle, il varie généralement entre 3 et 4 pour les plats solides et peut atteindre 5 à 7 pour les boissons. Il permet de fixer le prix de vente en fonction du coût de revient."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la marge moyenne d'un restaurant en France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En France, la marge nette moyenne d'un restaurant se situe entre 2% et 4% pour un restaurant classique, et jusqu'à 15% pour les concepts à forte rotation (fast-casual, street food). La marge brute sur les solides doit atteindre 70% à 75% pour assurer la rentabilité."
          }
        }
