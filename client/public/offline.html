<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>RestauMargin — Hors ligne</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'General Sans', 'DM Sans', system-ui, sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 420px;
      width: 100%;
    }
    .logo-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 1.25rem;
      background: #0A0A0A;
      border: 1px solid #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrapper img {
      width: 48px;
      height: 48px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #FFFFFF 0%, #2DD4BF 50%, #22D3EE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #A3A3A3;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .status-card {
      background: #0A0A0A;
      border: 1px solid #1A1A1A;
      border-radius: 1rem;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #F59E0B;
      animation: pulse-glow 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .pulse-dot.connected {
      background: #22C55E;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 4px rgba(245, 158, 11, 0.4); }
      50% { box-shadow: 0 0 12px rgba(245, 158, 11, 0.7); }
    }
    .status-text {
      color: #A3A3A3;
      font-size: 0.85rem;
      text-align: left;
    }
    .status-text strong {
      color: #ffffff;
      font-weight: 600;
    }
    .saved-msg {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      color: #737373;
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }
    .saved-msg svg {
      width: 16px;
      height: 16px;
      color: #0D9488;
    }
    .retry-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover {
      opacity: 0.85;
    }
    .retry-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .timer {
      color: #737373;
      font-size: 0.75rem;
      margin-top: 1rem;
    }

    /* Light mode */
    @media (prefers-color-scheme: light) {
      body { background: #ffffff; color: #111111; }
      h1 {
        background: linear-gradient(135deg, #111111 0%, #0D9488 50%, #06B6D4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle { color: #737373; }
      .logo-wrapper { background: #F5F5F5; border-color: #E5E7EB; }
      .status-card { background: #F5F5F5; border-color: #E5E7EB; }
      .status-text { color: #737373; }
      .status-text strong { color: #111111; }
      .saved-msg { color: #9CA3AF; }
      .retry-btn { background: #111111; color: #ffffff; }
      .timer { color: #9CA3AF; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <img src="/icon.svg" alt="RestauMargin" />
    </div>

    <h1>Vous etes hors ligne</h1>
    <p class="subtitle">
      Pas de connexion internet detectee.<br />
      RestauMargin se reconnectera automatiquement.
    </p>

    <div class="status-card">
      <div class="status-row">
        <div class="pulse-dot" id="statusDot"></div>
        <div class="status-text">
          <strong id="statusLabel">Recherche de connexion...</strong><br />
          Tentative automatique toutes les 5 secondes
        </div>
      </div>
    </div>

    <div class="saved-msg">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Vos donnees sont sauvegardees localement
    </div>

    <button class="retry-btn" id="retryBtn" onclick="tryReconnect()">
      Reessayer maintenant
    </button>
    <div class="timer" id="timer">Prochaine tentative dans 5s</div>
  </div>

  <script>
    let countdown = 5;
    let interval;

    function tryReconnect() {
      const btn = document.getElementById('retryBtn');
      const label = document.getElementById('statusLabel');
      btn.disabled = true;
      label.textContent = 'Tentative de connexion...';

      fetch('/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function() {
          // Connected — redirect to app
          document.getElementById('statusDot').classList.add('connected');
          label.textContent = 'Connexion retablie !';
          setTimeout(function() {
            window.location.href = '/dashboard';
          }, 500);
        })
        .catch(function() {
          // Still offline
          label.textContent = 'Toujours hors ligne';
          btn.disabled = false;
          countdown = 5;
        });
    }

    function tick() {
      countdown--;
      if (countdown <= 0) {
        tryReconnect();
        countdown = 5;
      }
      document.getElementById('timer').textContent = 'Prochaine tentative dans ' + countdown + 's';
    }

    interval = setInterval(tick, 1000);

    // If online event fires, redirect immediately
    window.addEventListener('online', function() {
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('statusLabel').textContent = 'Connexion retablie !';
      setTimeout(function() {
        window.location.href = '/dashboard';
      }, 500);
    });
  </script>
</body>
</html>
