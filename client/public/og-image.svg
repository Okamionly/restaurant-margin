<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo circle -->
  <circle cx="160" cy="315" r="60" fill="#0d9488" opacity="0.15"/>
  <text x="160" y="332" font-family="sans-serif" font-size="48" font-weight="bold" fill="#14b8a6" text-anchor="middle">RM</text>

  <!-- Title -->
  <text x="260" y="260" font-family="sans-serif" font-size="56" font-weight="bold" fill="white">RestauMargin</text>

  <!-- Subtitle -->
  <text x="260" y="320" font-family="sans-serif" font-size="28" fill="#a3a3a3">Calculez vos marges restaurant</text>
  <text x="260" y="360" font-family="sans-serif" font-size="28" fill="#a3a3a3">automatiquement avec l'IA</text>

  <!-- Features pills -->
  <rect x="260" y="400" width="180" height="40" rx="20" fill="#0d9488" opacity="0.2"/>
  <text x="350" y="426" font-family="sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">Food Cost</text>

  <rect x="460" y="400" width="220" height="40" rx="20" fill="#0d9488" opacity="0.2"/>
  <text x="570" y="426" font-family="sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">Fiches Techniques</text>

  <rect x="700" y="400" width="140" height="40" rx="20" fill="#0d9488" opacity="0.2"/>
  <text x="770" y="426" font-family="sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">IA Chef</text>

  <rect x="860" y="400" width="120" height="40" rx="20" fill="#0d9488" opacity="0.2"/>
  <text x="920" y="426" font-family="sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">KDS</text>

  <!-- URL -->
  <text x="260" y="540" font-family="sans-serif" font-size="20" fill="#737373">www.restaumargin.fr</text>

  <!-- Accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
