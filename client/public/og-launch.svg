<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Curves lines decoratives -->
  <g opacity="0.15" stroke="#10B981" stroke-width="2" fill="none">
    <path d="M 0,180 Q 300,140 600,200 T 1200,180"/>
    <path d="M 0,260 Q 300,220 600,280 T 1200,260"/>
    <path d="M 0,340 Q 300,300 600,360 T 1200,340"/>
    <path d="M 0,420 Q 300,380 600,440 T 1200,420"/>
    <path d="M 0,500 Q 300,460 600,520 T 1200,500"/>
  </g>

  <!-- Badge "Coming soon" -->
  <g transform="translate(80, 90)">
    <rect width="280" height="44" rx="22" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="140" y="29" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#047857" letter-spacing="1.5">
      🚀 COMING SOON ON PRODUCT HUNT
    </text>
  </g>

  <!-- Main title -->
  <g transform="translate(80, 200)">
    <text font-family="-apple-system, 'Satoshi', sans-serif" font-size="68" font-weight="900" fill="#0F172A" letter-spacing="-2">
      <tspan x="0" dy="0">On lance RestauMargin</tspan>
      <tspan x="0" dy="80">sur </tspan>
      <tspan fill="url(#emeraldGrad)" font-weight="900">Product Hunt</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(80, 410)">
    <text font-family="-apple-system, sans-serif" font-size="26" font-weight="500" fill="#525252">
      <tspan x="0" dy="0">Le 6 mai 2026 — aide-nous à atteindre le Top 5</tspan>
      <tspan x="0" dy="38">du jour. Suivi des marges resto par IA.</tspan>
    </text>
  </g>

  <!-- Logo + URL -->
  <g transform="translate(80, 540)">
    <circle cx="20" cy="20" r="20" fill="url(#emeraldGrad)"/>
    <text x="20" y="27" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="20" font-weight="900" fill="white">R</text>
    <text x="56" y="20" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">RestauMargin</text>
    <text x="56" y="42" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#737373">restaumargin.fr/launch</text>
  </g>

  <!-- Decorative circles right side -->
  <g transform="translate(900, 280)">
    <circle cx="0" cy="0" r="180" fill="url(#emeraldGrad)" opacity="0.1"/>
    <circle cx="0" cy="0" r="140" fill="url(#emeraldGrad)" opacity="0.15"/>
    <circle cx="0" cy="0" r="100" fill="url(#emeraldGrad)" opacity="0.25"/>
    <circle cx="0" cy="0" r="60" fill="url(#emeraldGrad)"/>
    <text x="0" y="10" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="48" fill="white">🚀</text>
  </g>

  <!-- Date badge -->
  <g transform="translate(900, 540)" filter="url(#shadow)">
    <rect x="-90" y="-30" width="180" height="60" rx="14" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="0" y="-7" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="1">JOUR-J</text>
    <text x="0" y="20" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="900" fill="#10B981">06.05.2026</text>
  </g>
</svg>
